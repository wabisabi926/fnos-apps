services:
  wg-easy:
    image: ${DOCKER_MIRROR}ghcr.io/wg-easy/wg-easy:${VERSION}
    container_name: wg-easy
    ports:
      - "${TRIM_SERVICE_PORT}:51821"
      - "51820:51820/udp"
    volumes:
      - ${TRIM_PKGVAR:?}/config:/etc/wireguard
    # Explicit env_file: fnOS framework invokes docker compose from a cwd where
    # compose-file-directory \`.env\` auto-discovery does NOT happen. Without this
    # directive, WG_HOST / PASSWORD_HASH set by the wizard were silently ignored
    # (latent bug found while fixing #146; same plumbing pattern as firefox).
    # service_postinst ALWAYS writes .env to guarantee the file exists.
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - WG_HOST=${WG_HOST:-}
      - PASSWORD_HASH=${PASSWORD_HASH:-}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped
