services:
  moviepilot:
    image: ${DOCKER_MIRROR}docker.io/jxxghp/moviepilot-v2:${VERSION}
    container_name: moviepilot
    ports:
      - "${TRIM_SERVICE_PORT}:3000"
    volumes:
      - ${TRIM_PKGVAR:?}/config:/config
      - ${TRIM_PKGVAR:?}/core:/moviepilot
      # MEDIA_DIR / DOWNLOAD_DIR are sed-patched into the volume bindings by
      # service_postinst when wizard provides them (fnOS doesn't process compose
      # interpolation against env_file). Defaults fall back to app-private dirs.
      - ${TRIM_PKGVAR:?}/media:/media
      - ${TRIM_PKGVAR:?}/downloads:/downloads
    environment:
      - TZ=Asia/Shanghai
      - PUID=${TRIM_UID}
      - PGID=${TRIM_GID}
      - UMASK=022
      # v2 架构：NGINX_PORT=Web 入口(须与下方 ports 的容器端口一致)，PORT=后端 API(默认 3001)。
      # 切勿把 PORT 设为 3000，否则会与 nginx 抢端口或导致代理无法命中 Python，登录等 API 会失败。
      - NGINX_PORT=3000
      - PORT=3001
      - GITHUB_PROXY=https://gh-proxy.com/
      - SUPERUSER=admin
      # SUPERUSER_PASSWORD: literal default; service_postinst seds this line
      # in-place when wizard supplies a custom password (fnOS doesn't interpolate
      # \`${VAR:-default}\` against env_file values).
      - SUPERUSER_PASSWORD=password
    restart: unless-stopped
