services:
  audiobookshelf:
    image: ${DOCKER_MIRROR}docker.io/advplyr/audiobookshelf:${VERSION}
    container_name: audiobookshelf
    ports:
      - "${TRIM_SERVICE_PORT}:80"
    volumes:
      - ${TRIM_PKGVAR:?}/config:/config
      - ${TRIM_PKGVAR:?}/metadata:/metadata
      # AUDIOBOOK_DIR / PODCAST_DIR are literal defaults here; service_postinst
      # sed-patches these volume lines in-place when wizard supplies custom paths.
      # (fnOS reads docker-compose.yaml via Docker API, not \`docker compose\` CLI,
      # so env_file and \`${VAR:-default}\` interpolation against env_file don't work.)
      - ${TRIM_PKGVAR:?}/audiobooks:/audiobooks
      - ${TRIM_PKGVAR:?}/podcasts:/podcasts
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
