services:
  ani-rss:
    image: ${DOCKER_MIRROR}docker.io/wushuo894/ani-rss:v${VERSION}
    container_name: ani-rss
    ports:
      - "${TRIM_SERVICE_PORT}:7789"
    volumes:
      - ${TRIM_PKGVAR:?}/config:/config
      # DOWNLOAD_DIR literal default; service_postinst sed-patches this volume line
      # in-place when wizard supplies a custom path. (fnOS uses Docker API, not
      # \`docker compose\` CLI — env_file ignored, interpolation only works for TRIM_.)
      - ${TRIM_PKGVAR:?}/downloads:/downloads
    environment:
      - TZ=Asia/Shanghai
      - PUID=${TRIM_UID}
      - PGID=${TRIM_GID}
    restart: unless-stopped
