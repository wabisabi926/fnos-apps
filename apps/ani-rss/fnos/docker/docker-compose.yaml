services:
  ani-rss:
    image: ${DOCKER_MIRROR}docker.io/wushuo894/ani-rss:v${VERSION}
    container_name: ani-rss
    ports:
      - "${TRIM_SERVICE_PORT}:7789"
    volumes:
      - ${TRIM_PKGVAR:?}/config:/config
      - ${DOWNLOAD_DIR:-${TRIM_PKGVAR:?}/downloads}:/downloads
    # Explicit env_file: fnOS framework's docker compose invocation does NOT
    # auto-discover compose-file-directory \`.env\`. Without this directive,
    # DOWNLOAD_DIR set by the wizard was silently ignored (latent bug found
    # while fixing #146; same plumbing pattern as firefox).
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - PUID=${TRIM_UID}
      - PGID=${TRIM_GID}
    restart: unless-stopped
